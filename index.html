<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>QR Scanner</title>
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- jsQR Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow-x: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        video { 
            width: 100%; 
            height: auto; 
            display: block;
            object-fit: cover;
        }
        input, select, textarea { font-size: 16px !important; }
        .transition-fast { transition: all 0.15s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(0.95); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    // QR Scanner Application - Enhanced Error Handling
    (function() {
        'use strict';
        
        let state = {
            scanning: false,
            settingsOpen: false,
            scanMode: 'auto_open_url',
            baseUrl: '',
            customParams: [],
            lastScanned: '',
            previewData: null,
            error: '',
            errorDetails: '',
            language: 'ru',
            saveMessage: '',
            soundEnabled: true,
            vibrationEnabled: true,
            cameraPermission: 'unknown'
        };

        let videoElement = null;
        let canvasElement = null;
        let stream = null;
        let animationFrame = null;
        let audioContext = null;

        const translations = {
            ru: {
                title: 'QR Сканер',
                settings: 'Настройки',
                scanMode: 'Режим сканирования',
                mode1: 'Открыть URL автоматически',
                mode2: 'Добавить код к базовому URL',
                mode3: 'Предпросмотр URL перед открытием',
                mode4: 'Показать содержимое QR',
                baseUrl: 'Базовый URL',
                customParams: 'Дополнительные параметры',
                paramName: 'Название',
                paramValue: 'Значение',
                addParam: '+ Добавить',
                saveSettings: 'Сохранить',
                resetSettings: 'Сбросить',
                settingsSaved: '✓ Сохранено!',
                settingsReset: 'Настройки сброшены',
                soundFeedback: 'Звук',
                vibrationFeedback: 'Вибрация',
                readyToScan: 'Готов к сканированию',
                readyDescription: 'Нажмите для запуска камеры',
                startScanner: 'ЗАПУСТИТЬ СКАНЕР',
                aimCamera: 'Наведите на QR-код',
                stopScanning: 'СТОП',
                infoNote: 'Быстрое сканирование для мероприятий',
                errorCameraBlocked: '🚫 Камера заблокирована',
                errorCameraNotFound: '📷 Камера не найдена',
                errorCameraInUse: '⚠️ Камера используется',
                errorPermissionDenied: '🔒 Доступ запрещён',
                errorGeneral: '❌ Ошибка камеры',
                helpPermission: 'Нажмите на замок 🔒 в адресной строке → Разрешить камеру',
                helpNotFound: 'Проверьте, подключена ли камера',
                helpInUse: 'Закройте другие приложения, использующие камеру',
                helpGeneral: 'Попробуйте перезагрузить страницу',
                checkPermissions: 'Проверить доступ к камере',
                previewTitle: 'Отсканировано',
                scannedContent: 'Содержимое:',
                openLink: 'ОТКРЫТЬ',
                scanAgain: 'СКАНИРОВАТЬ ЕЩЁ',
                isUrl: 'URL обнаружен',
                mode2Required: 'Укажите базовый URL',
                delete: 'Удалить',
                testCamera: 'Тест камеры',
                cameraWorking: '✓ Камера работает',
                requesting: 'Запрос доступа...'
            },
            he: {
                title: 'סורק QR',
                settings: 'הגדרות',
                scanMode: 'מצב סריקה',
                mode1: 'פתח URL אוטומטית',
                mode2: 'הוסף קוד ל-URL בסיס',
                mode3: 'תצוגה מקדימה',
                mode4: 'הצג תוכן',
                baseUrl: 'URL בסיס',
                customParams: 'פרמטרים נוספים',
                paramName: 'שם',
                paramValue: 'ערך',
                addParam: '+ הוסף',
                saveSettings: 'שמור',
                resetSettings: 'אפס',
                settingsSaved: '✓ נשמר!',
                settingsReset: 'הגדרות אופסו',
                soundFeedback: 'צליל',
                vibrationFeedback: 'רטט',
                readyToScan: 'מוכן לסריקה',
                readyDescription: 'לחץ להפעלת המצלמה',
                startScanner: 'הפעל סורק',
                aimCamera: 'כוון לקוד QR',
                stopScanning: 'עצור',
                infoNote: 'סריקה מהירה לאירועים',
                errorCameraBlocked: '🚫 המצלמה חסומה',
                errorCameraNotFound: '📷 מצלמה לא נמצאה',
                errorCameraInUse: '⚠️ המצלמה בשימוש',
                errorPermissionDenied: '🔒 גישה נדחתה',
                errorGeneral: '❌ שגיאת מצלמה',
                helpPermission: 'לחץ על המנעול 🔒 בשורת הכתובת → אפשר מצלמה',
                helpNotFound: 'בדוק אם המצלמה מחוברת',
                helpInUse: 'סגור אפליקציות אחרות המשתמשות במצלמה',
                helpGeneral: 'נסה לטעון מחדש את הדף',
                checkPermissions: 'בדוק גישה למצלמה',
                previewTitle: 'נסרק',
                scannedContent: 'תוכן:',
                openLink: 'פתח',
                scanAgain: 'סרוק שוב',
                isUrl: 'URL זוהה',
                mode2Required: 'הגדר URL בסיס',
                delete: 'מחק',
                testCamera: 'בדיקת מצלמה',
                cameraWorking: '✓ המצלמה עובדת',
                requesting: 'מבקש גישה...'
            }
        };

        function loadSettings() {
            try {
                const saved = localStorage.getItem('qr_scanner_settings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    state = { ...state, ...settings };
                }
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function saveSettings() {
            const settings = {
                baseUrl: state.baseUrl,
                customParams: state.customParams,
                language: state.language,
                scanMode: state.scanMode,
                soundEnabled: state.soundEnabled,
                vibrationEnabled: state.vibrationEnabled
            };
            localStorage.setItem('qr_scanner_settings', JSON.stringify(settings));
            state.saveMessage = translations[state.language].settingsSaved;
            render();
            setTimeout(() => {
                state.saveMessage = '';
                render();
            }, 2000);
        }

        function playBeep() {
            if (!state.soundEnabled) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.15);
            } catch (e) {}
        }

        function triggerVibration() {
            if (!state.vibrationEnabled) return;
            try {
                if ('vibrate' in navigator) navigator.vibrate(100);
            } catch (e) {}
        }

        function isURL(str) {
            try {
                new URL(str);
                return true;
            } catch {
                return str.startsWith('http://') || str.startsWith('https://');
            }
        }

        function buildFinalUrl(qrCode) {
            if (!state.baseUrl) return '';
            const params = new URLSearchParams();
            params.append('code', qrCode);
            state.customParams.forEach(p => {
                if (p.name && p.value) params.append(p.name, p.value);
            });
            const separator = state.baseUrl.includes('?') ? '&' : '?';
            return state.baseUrl + separator + params.toString();
        }

        // Enhanced camera start with better error handling
        async function startCamera() {
            const t = translations[state.language];
            
            try {
                state.error = '';
                state.errorDetails = '';
                state.previewData = null;
                render();

                if (state.scanMode === 'append_to_url' && !state.baseUrl) {
                    state.error = t.mode2Required;
                    render();
                    return;
                }

                // Check if we're on HTTPS
                if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                    state.error = '🔒 HTTPS Required';
                    state.errorDetails = 'Camera access requires HTTPS. Use https:// in URL.';
                    render();
                    return;
                }

                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }

                // Show requesting message
                state.error = t.requesting;
                render();

                // Request camera with fallback strategy
                let constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err1) {
                    console.log('First attempt failed, trying basic constraints...', err1);
                    // Fallback to basic constraints
                    constraints = {
                        video: { facingMode: 'environment' },
                        audio: false
                    };
                    try {
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                    } catch (err2) {
                        console.log('Second attempt failed, trying any camera...', err2);
                        // Last resort - any camera
                        constraints = { video: true, audio: false };
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                    }
                }

                videoElement.srcObject = stream;
                
                await videoElement.play();
                state.scanning = true;
                state.error = '';
                state.cameraPermission = 'granted';
                render();
                startScanning();
                
            } catch (err) {
                console.error('Camera error:', err);
                handleCameraError(err);
            }
        }

        function handleCameraError(err) {
            const t = translations[state.language];
            
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                state.error = t.errorPermissionDenied;
                state.errorDetails = t.helpPermission;
                state.cameraPermission = 'denied';
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                state.error = t.errorCameraNotFound;
                state.errorDetails = t.helpNotFound;
            } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                state.error = t.errorCameraInUse;
                state.errorDetails = t.helpInUse;
            } else if (err.name === 'OverconstrainedError') {
                state.error = t.errorCameraBlocked;
                state.errorDetails = 'Try using a different browser or device';
            } else if (err.name === 'SecurityError') {
                state.error = '🔒 Security Error';
                state.errorDetails = 'Camera blocked by browser security. Check site permissions.';
            } else {
                state.error = t.errorGeneral;
                state.errorDetails = t.helpGeneral + ' (Error: ' + err.name + ')';
            }
            
            render();
        }

        async function checkCameraPermission() {
            const t = translations[state.language];
            try {
                if (!navigator.permissions) {
                    state.error = 'Permissions API not supported';
                    render();
                    return;
                }
                
                const result = await navigator.permissions.query({ name: 'camera' });
                
                if (result.state === 'granted') {
                    state.error = t.cameraWorking;
                    state.errorDetails = 'Permission: Granted ✓';
                } else if (result.state === 'denied') {
                    state.error = t.errorPermissionDenied;
                    state.errorDetails = t.helpPermission;
                } else {
                    state.error = 'Camera permission: Prompt';
                    state.errorDetails = 'Click "Start Scanner" to grant access';
                }
                
                render();
            } catch (err) {
                // Fallback for browsers that don't support permissions API
                state.error = 'Click "Start Scanner" to test camera';
                render();
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            state.scanning = false;
        }

        function detectQR() {
            if (!videoElement || videoElement.readyState !== 4) {
                animationFrame = requestAnimationFrame(detectQR);
                return;
            }

            const canvas = canvasElement;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;

            if (canvas.width > 0) {
                ctx.drawImage(videoElement, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                if (typeof jsQR !== 'undefined') {
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: 'dontInvert'
                    });
                    
                    if (code && code.data) {
                        handleQRDetected(code.data);
                        return;
                    }
                }
            }

            animationFrame = requestAnimationFrame(detectQR);
        }

        function startScanning() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(detectQR);
        }

        function handleQRDetected(qrData) {
            stopCamera();
            playBeep();
            triggerVibration();
            state.lastScanned = qrData;

            switch (state.scanMode) {
                case 'auto_open_url':
                    if (isURL(qrData)) {
                        window.location.href = qrData;
                    } else {
                        state.previewData = { content: qrData, isUrl: false };
                        render();
                    }
                    break;
                    
                case 'append_to_url':
                    window.location.href = buildFinalUrl(qrData);
                    break;
                    
                case 'preview_url':
                case 'preview_content':
                    state.previewData = { content: qrData, isUrl: isURL(qrData) };
                    render();
                    break;
            }
        }

        function render() {
            const t = translations[state.language];
            const isRTL = state.language === 'he';
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-blue-600 to-purple-700 flex flex-col" dir="${isRTL ? 'rtl' : 'ltr'}">
                    <div class="bg-white/10 backdrop-blur-md border-b border-white/20 p-3">
                        <div class="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                                <i data-lucide="camera" class="w-6 h-6"></i>
                                ${t.title}
                            </h1>
                            <div class="flex gap-2">
                                <button onclick="window.qrApp.toggleLanguage()" class="p-2 rounded-lg bg-white/20 hover:bg-white/30 transition-fast text-white flex items-center gap-1">
                                    <i data-lucide="globe" class="w-5 h-5"></i>
                                    <span class="text-xs font-bold">${state.language.toUpperCase()}</span>
                                </button>
                                <button onclick="window.qrApp.toggleSettings()" class="p-2 rounded-lg bg-white/20 hover:bg-white/30 transition-fast text-white">
                                    <i data-lucide="settings" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    ${state.settingsOpen ? renderSettings(t, isRTL) : ''}

                    <div class="flex-1 flex items-center justify-center p-4">
                        <div class="max-w-2xl w-full">
                            ${state.error ? `
                                <div class="bg-red-500/20 border-2 border-red-400/50 rounded-xl p-4 mb-4 text-white">
                                    <div class="text-center font-bold text-lg mb-2">${state.error}</div>
                                    ${state.errorDetails ? `
                                        <div class="text-sm text-white/90 text-center mb-3">${state.errorDetails}</div>
                                        ${state.cameraPermission === 'denied' ? `
                                            <button onclick="window.qrApp.checkPermissions()" class="w-full px-4 py-2 bg-blue-500/30 hover:bg-blue-500/40 rounded-lg font-semibold border border-blue-400/50 transition-fast">
                                                ${t.checkPermissions}
                                            </button>
                                        ` : ''}
                                    ` : ''}
                                </div>
                            ` : ''}
                            
                            ${state.previewData ? renderPreview(t) : ''}
                            ${!state.previewData && !state.scanning ? renderReady(t) : ''}
                            ${!state.previewData && state.scanning ? renderScanning(t) : ''}
                        </div>
                    </div>

                    <div class="bg-white/5 backdrop-blur-sm border-t border-white/10 p-2 text-center">
                        <p class="text-white/60 text-xs">${t.infoNote}</p>
                    </div>
                </div>
            `;

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            videoElement = document.getElementById('qr-video');
            canvasElement = document.getElementById('qr-canvas');
        }

        function renderSettings(t, isRTL) {
            return `
                <div class="bg-white/10 backdrop-blur-md border-b border-white/20 p-4 max-h-[60vh] overflow-y-auto hide-scrollbar">
                    <div class="max-w-4xl mx-auto">
                        ${state.saveMessage ? `<div class="bg-green-500/30 border border-green-400/50 rounded-lg p-2 mb-3 text-white text-center text-sm">${state.saveMessage}</div>` : ''}
                        
                        <div class="mb-3">
                            <label class="block text-sm font-semibold text-white mb-2">${t.scanMode}</label>
                            <div class="space-y-1">
                                ${['auto_open_url', 'append_to_url', 'preview_url', 'preview_content'].map((mode, i) => `
                                    <label class="flex items-center gap-2 p-2 bg-white/10 rounded-lg cursor-pointer hover:bg-white/15 transition-fast">
                                        <input type="radio" name="scanMode" value="${mode}" ${state.scanMode === mode ? 'checked' : ''} onchange="window.qrApp.setScanMode('${mode}')" class="w-4 h-4">
                                        <span class="text-white text-sm">${t['mode' + (i + 1)]}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        <div class="flex gap-2 mb-3">
                            <label class="flex-1 flex items-center gap-2 p-2 bg-white/10 rounded-lg cursor-pointer">
                                <input type="checkbox" ${state.soundEnabled ? 'checked' : ''} onchange="window.qrApp.toggleSound()" class="w-4 h-4">
                                <span class="text-white text-sm">${t.soundFeedback}</span>
                            </label>
                            <label class="flex-1 flex items-center gap-2 p-2 bg-white/10 rounded-lg cursor-pointer">
                                <input type="checkbox" ${state.vibrationEnabled ? 'checked' : ''} onchange="window.qrApp.toggleVibration()" class="w-4 h-4">
                                <span class="text-white text-sm">${t.vibrationFeedback}</span>
                            </label>
                        </div>

                        ${state.scanMode === 'append_to_url' ? `
                            <div class="mb-3">
                                <label class="block text-sm font-semibold text-white mb-1">${t.baseUrl}</label>
                                <input type="url" value="${state.baseUrl}" onchange="window.qrApp.setBaseUrl(this.value)" 
                                    class="w-full px-3 py-2 rounded-lg bg-white/20 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 text-sm" 
                                    placeholder="https://example.com/verify" dir="ltr">
                            </div>

                            <div class="mb-3">
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-sm font-semibold text-white">${t.customParams}</label>
                                    <button onclick="window.qrApp.addParam()" class="px-3 py-1 bg-green-500/30 hover:bg-green-500/40 rounded-lg text-white text-xs border border-green-400/50 transition-fast">
                                        ${t.addParam}
                                    </button>
                                </div>
                                ${state.customParams.map(p => `
                                    <div class="flex gap-2 mb-2">
                                        <input type="text" value="${p.name}" onchange="window.qrApp.updateParam(${p.id}, 'name', this.value)"
                                            placeholder="${t.paramName}" dir="ltr"
                                            class="flex-1 px-2 py-1 rounded bg-white/20 border border-white/30 text-white placeholder-white/50 text-sm">
                                        <input type="text" value="${p.value}" onchange="window.qrApp.updateParam(${p.id}, 'value', this.value)"
                                            placeholder="${t.paramValue}"
                                            class="flex-1 px-2 py-1 rounded bg-white/20 border border-white/30 text-white placeholder-white/50 text-sm">
                                        <button onclick="window.qrApp.removeParam(${p.id})" class="px-2 py-1 bg-red-500/30 hover:bg-red-500/40 rounded text-white text-xs border border-red-400/50">
                                            ${t.delete}
                                        </button>
                                    </div>
                                `).join('')}
                            </div>

                            ${state.baseUrl ? `
                                <div class="p-2 bg-black/20 rounded text-xs text-white break-all mb-3" dir="ltr">
                                    ${buildFinalUrl('ABC123')}
                                </div>
                            ` : ''}
                        ` : ''}

                        <div class="flex gap-2">
                            <button onclick="window.qrApp.saveSettings()" class="flex-1 px-4 py-2 bg-blue-500/30 hover:bg-blue-500/40 text-white rounded-lg font-semibold border border-blue-400/50 transition-fast text-sm">
                                ${t.saveSettings}
                            </button>
                            <button onclick="window.qrApp.resetSettings()" class="px-4 py-2 bg-red-500/30 hover:bg-red-500/40 text-white rounded-lg border border-red-400/50 transition-fast text-sm">
                                ${t.resetSettings}
                            </button>
                        </div>

                        <button onclick="window.qrApp.checkPermissions()" class="w-full mt-2 px-4 py-2 bg-purple-500/30 hover:bg-purple-500/40 text-white rounded-lg border border-purple-400/50 transition-fast text-sm">
                            ${t.testCamera}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderPreview(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 text-center border border-white/20">
                    <i data-lucide="eye" class="w-16 h-16 mx-auto mb-4 text-white/80"></i>
                    <h2 class="text-xl font-bold text-white mb-3">${t.previewTitle}</h2>
                    <div class="bg-white/20 rounded-lg p-3 mb-4">
                        <p class="text-white/70 text-xs mb-1">${t.scannedContent}</p>
                        <div class="text-white break-all text-sm bg-black/20 p-2 rounded" dir="ltr">${state.previewData.content}</div>
                    </div>
                    <div class="flex gap-2">
                        ${state.previewData.isUrl ? `
                            <button onclick="window.qrApp.openUrl()" class="flex-1 px-6 py-3 bg-green-500/30 hover:bg-green-500/40 text-white rounded-xl font-bold border border-green-400/50 transition-fast">
                                ${t.openLink}
                            </button>
                        ` : ''}
                        <button onclick="window.qrApp.scanAgain()" class="flex-1 px-6 py-3 bg-blue-500/30 hover:bg-blue-500/40 text-white rounded-xl font-bold border border-blue-400/50 transition-fast">
                            ${t.scanAgain}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderReady(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-8 text-center border border-white/20">
                    <i data-lucide="camera" class="w-20 h-20 mx-auto mb-6 text-white/80 pulse-ring"></i>
                    <h2 class="text-2xl font-bold text-white mb-2">${t.readyToScan}</h2>
                    <p class="text-white/80 mb-6 text-sm">${t.readyDescription}</p>
                    <button onclick="window.qrApp.startCamera()" class="px-10 py-4 bg-white text-blue-600 rounded-xl font-bold text-lg hover:bg-white/90 transition-fast shadow-lg transform hover:scale-105">
                        ${t.startScanner}
                    </button>
                </div>
            `;
        }

        function renderScanning(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
                    <div class="relative bg-black">
                        <video id="qr-video" class="w-full" playsinline autoplay muted></video>
                        <canvas id="qr-canvas" class="hidden"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="w-64 h-64 border-4 border-white/60 rounded-2xl relative pulse-ring">
                                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-2xl"></div>
                                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-2xl"></div>
                                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-2xl"></div>
                                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-2xl"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 bg-white/5">
                        <p class="text-white text-center mb-2 text-sm font-semibold">${t.aimCamera}</p>
                        <button onclick="window.qrApp.stopCamera()" class="w-full px-6 py-3 bg-red-500/30 hover:bg-red-500/40 text-white rounded-lg font-bold transition-fast border border-red-400/50">
                            ${t.stopScanning}
                        </button>
                    </div>
                </div>
            `;
        }

        window.qrApp = {
            startCamera: () => { startCamera(); },
            stopCamera: () => { stopCamera(); render(); },
            toggleSettings: () => { state.settingsOpen = !state.settingsOpen; render(); },
            toggleLanguage: () => {
                state.language = state.language === 'ru' ? 'he' : 'ru';
                saveSettings();
                render();
            },
            setScanMode: (mode) => { state.scanMode = mode; render(); },
            toggleSound: () => { state.soundEnabled = !state.soundEnabled; },
            toggleVibration: () => { state.vibrationEnabled = !state.vibrationEnabled; },
            setBaseUrl: (url) => { state.baseUrl = url; render(); },
            addParam: () => { 
                state.customParams.push({ id: Date.now(), name: '', value: '' }); 
                render(); 
            },
            updateParam: (id, field, value) => {
                const param = state.customParams.find(p => p.id === id);
                if (param) param[field] = value;
            },
            removeParam: (id) => {
                state.customParams = state.customParams.filter(p => p.id !== id);
                render();
            },
            saveSettings: () => { saveSettings(); },
            resetSettings: () => {
                if (confirm(translations[state.language].settingsReset + '?')) {
                    localStorage.removeItem('qr_scanner_settings');
                    state.baseUrl = '';
                    state.customParams = [];
                    state.scanMode = 'auto_open_url';
                    render();
                }
            },
            openUrl: () => {
                if (state.previewData && state.previewData.content) {
                    window.location.href = state.previewData.content;
                }
            },
            scanAgain: () => {
                state.previewData = null;
                startCamera();
            },
            checkPermissions: () => {
                checkCameraPermission();
            }
        };

        loadSettings();
        render();
    })();
    </script>
</body>
</html>
