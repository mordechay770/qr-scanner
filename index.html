<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .lang-btn, .settings-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        .lang-btn:active, .settings-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        #video {
            width: 100%;
            display: block;
            min-height: 300px;
        }
        
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 20px;
            pointer-events: none;
        }
        
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: white;
            border-style: solid;
        }
        
        .corner.tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-radius: 20px 0 0 0; }
        .corner.tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-radius: 0 20px 0 0; }
        .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-radius: 0 0 0 20px; }
        .corner.br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-radius: 0 0 20px 0; }
        
        .btn-primary {
            width: 100%;
            background: white;
            color: #667eea;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-stop {
            width: 100%;
            background: rgba(239, 68, 68, 0.3);
            color: white;
            border: 2px solid rgba(239, 68, 68, 0.6);
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .ready-screen {
            background: rgba(255,255,255,0.1);
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .ready-screen h2 {
            font-size: 26px;
            margin-bottom: 10px;
        }
        
        .ready-screen p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .preview {
            background: rgba(255,255,255,0.1);
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .preview h2 {
            margin-bottom: 20px;
        }
        
        .preview-content {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            margin-bottom: 20px;
            font-family: monospace;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn-secondary {
            flex: 1;
            background: rgba(59, 130, 246, 0.3);
            color: white;
            border: 2px solid rgba(59, 130, 246, 0.6);
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-success {
            flex: 1;
            background: rgba(34, 197, 94, 0.3);
            color: white;
            border: 2px solid rgba(34, 197, 94, 0.6);
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .settings {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .settings h3 {
            margin-bottom: 15px;
        }
        
        .radio-group {
            margin-bottom: 15px;
        }
        
        .radio-option {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .radio-option:active {
            background: rgba(255,255,255,0.2);
        }
        
        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .hidden {
            display: none !important;
        }
        
        canvas {
            display: none;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🎯 QR Сканер</div>
            <div>
                <button class="lang-btn" onclick="toggleLang()">RU</button>
                <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
            </div>
        </div>
        
        <div id="settings" class="settings hidden">
            <h3>Режим сканирования</h3>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="mode" value="auto" checked onchange="setMode(this.value)">
                    Открыть URL автоматически
                </label>
                <label class="radio-option">
                    <input type="radio" name="mode" value="append" onchange="setMode(this.value)">
                    Добавить код к URL
                </label>
                <label class="radio-option">
                    <input type="radio" name="mode" value="preview" onchange="setMode(this.value)">
                    Предпросмотр
                </label>
            </div>
            
            <div id="urlSettings" class="hidden">
                <input type="url" id="baseUrl" placeholder="https://example.com/verify">
            </div>
            
            <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
        </div>
        
        <div id="error" class="error hidden"></div>
        
        <div id="readyScreen" class="ready-screen">
            <h2>Готов к сканированию</h2>
            <p>Нажмите кнопку для запуска камеры</p>
            <button class="btn-primary" onclick="startScanner()">ЗАПУСТИТЬ СКАНЕР</button>
        </div>
        
        <div id="scanningScreen" class="hidden">
            <div class="video-container">
                <video id="video" playsinline autoplay muted></video>
                <canvas id="canvas"></canvas>
                <div class="overlay">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                </div>
            </div>
            <div class="status">Наведите на QR-код</div>
            <button class="btn-stop" onclick="stopScanner()">ОСТАНОВИТЬ</button>
        </div>
        
        <div id="previewScreen" class="preview hidden">
            <h2>✓ Отсканировано</h2>
            <div class="preview-content" id="previewContent"></div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="scanAgain()">ЕЩЁ РАЗ</button>
                <button class="btn-success" id="openBtn" onclick="openUrl()">ОТКРЫТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let video, canvas, ctx, stream, scanning = false;
        let mode = 'auto';
        let baseUrl = '';
        let lastCode = '';
        let lang = 'ru';
        
        // Load settings
        function loadSettings() {
            const saved = localStorage.getItem('qr_settings');
            if (saved) {
                const settings = JSON.parse(saved);
                mode = settings.mode || 'auto';
                baseUrl = settings.baseUrl || '';
                lang = settings.lang || 'ru';
                document.querySelector(`input[value="${mode}"]`).checked = true;
                document.getElementById('baseUrl').value = baseUrl;
                updateUrlSettings();
            }
        }
        
        function saveSettings() {
            const settings = {
                mode,
                baseUrl: document.getElementById('baseUrl').value,
                lang
            };
            localStorage.setItem('qr_settings', JSON.stringify(settings));
            baseUrl = settings.baseUrl;
            alert('✓ Сохранено');
        }
        
        function setMode(value) {
            mode = value;
            updateUrlSettings();
        }
        
        function updateUrlSettings() {
            document.getElementById('urlSettings').classList.toggle('hidden', mode !== 'append');
        }
        
        function toggleSettings() {
            document.getElementById('settings').classList.toggle('hidden');
        }
        
        function toggleLang() {
            lang = lang === 'ru' ? 'he' : 'ru';
            document.querySelector('.lang-btn').textContent = lang.toUpperCase();
            document.body.dir = lang === 'he' ? 'rtl' : 'ltr';
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
        }
        
        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }
        
        async function startScanner() {
            hideError();
            
            video = document.getElementById('video');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            try {
                // Request camera - SIMPLE approach
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                
                video.srcObject = stream;
                
                // Wait for video to load
                video.onloadedmetadata = () => {
                    video.play();
                    
                    // Show scanning screen
                    document.getElementById('readyScreen').classList.add('hidden');
                    document.getElementById('scanningScreen').classList.remove('hidden');
                    
                    scanning = true;
                    requestAnimationFrame(scan);
                };
                
            } catch (err) {
                console.error('Camera error:', err);
                showError('❌ Ошибка доступа к камере: ' + err.message);
            }
        }
        
        function scan() {
            if (!scanning) return;
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                if (typeof jsQR !== 'undefined') {
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code) {
                        handleQR(code.data);
                        return;
                    }
                }
            }
            
            requestAnimationFrame(scan);
        }
        
        function handleQR(qrData) {
            stopScanner();
            lastCode = qrData;
            
            // Vibration
            if ('vibrate' in navigator) {
                navigator.vibrate(100);
            }
            
            // Beep
            playBeep();
            
            if (mode === 'auto') {
                if (isURL(qrData)) {
                    window.location.href = qrData;
                } else {
                    showPreview(qrData, false);
                }
            } else if (mode === 'append') {
                if (baseUrl) {
                    const separator = baseUrl.includes('?') ? '&' : '?';
                    window.location.href = baseUrl + separator + 'code=' + encodeURIComponent(qrData);
                } else {
                    showError('Укажите базовый URL в настройках');
                    showPreview(qrData, false);
                }
            } else {
                showPreview(qrData, isURL(qrData));
            }
        }
        
        function showPreview(content, isUrl) {
            document.getElementById('scanningScreen').classList.add('hidden');
            document.getElementById('previewScreen').classList.remove('hidden');
            document.getElementById('previewContent').textContent = content;
            document.getElementById('openBtn').classList.toggle('hidden', !isUrl);
        }
        
        function isURL(str) {
            try {
                new URL(str);
                return true;
            } catch {
                return str.startsWith('http');
            }
        }
        
        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {}
        }
        
        function stopScanner() {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('scanningScreen').classList.add('hidden');
            document.getElementById('readyScreen').classList.remove('hidden');
        }
        
        function scanAgain() {
            document.getElementById('previewScreen').classList.add('hidden');
            startScanner();
        }
        
        function openUrl() {
            if (lastCode) {
                window.location.href = lastCode;
            }
        }
        
        // Initialize
        loadSettings();
    </script>
</body>
</html>
