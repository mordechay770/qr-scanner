<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { font-size: 24px; font-weight: bold; }
        button {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:active { background: rgba(255,255,255,0.3); }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        #video { width: 100%; display: block; min-height: 300px; }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 20px;
            pointer-events: none;
        }
        .btn-primary {
            width: 100%;
            background: white;
            color: #667eea;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            margin: 10px 0;
        }
        .btn-stop {
            width: 100%;
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid rgba(239, 68, 68, 0.6);
            padding: 15px;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .ready-screen {
            background: rgba(255,255,255,0.1);
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
        }
        .ready-screen h2 { font-size: 26px; margin-bottom: 10px; }
        .ready-screen p { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .preview {
            background: rgba(255,255,255,0.1);
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
        }
        .preview-content {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            margin: 20px 0;
            font-family: monospace;
        }
        .settings {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .settings h3 { margin: 15px 0; font-size: 18px; }
        .radio-option {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 0;
        }
        input::placeholder { color: rgba(255,255,255,0.5); }
        .param-row { display: flex; gap: 5px; margin: 8px 0; }
        .param-row input { flex: 1; margin: 0; }
        .btn-delete {
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid rgba(239, 68, 68, 0.5);
            padding: 10px 15px;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group button { flex: 1; }
        .hidden { display: none !important; }
        canvas { display: none; }
        .status { text-align: center; padding: 10px; font-size: 16px; font-weight: bold; }
        .redirecting {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title" id="title">🎯 QR Сканер</div>
            <div>
                <button onclick="toggleLang()" id="langBtn">RU</button>
                <button onclick="toggleSettings()">⚙️</button>
            </div>
        </div>
        
        <div id="settings" class="settings hidden">
            <h3 id="s1">Режим сканирования</h3>
            <label class="radio-option">
                <input type="radio" name="mode" value="auto" checked onchange="mode=this.value;updateUI()">
                <span id="m1">Открыть URL автоматически</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="mode" value="append" onchange="mode=this.value;updateUI()">
                <span id="m2">Добавить код к URL</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="mode" value="preview" onchange="mode=this.value;updateUI()">
                <span id="m3">Предпросмотр</span>
            </label>
            
            <div id="urlSettings" class="hidden">
                <h3 id="s2">Базовый URL</h3>
                <input type="url" id="baseUrl" placeholder="https://example.com">
                
                <h3 id="s3">Параметры</h3>
                <div id="params"></div>
                <button onclick="addParam()" id="addBtn">+ Добавить</button>
            </div>
            
            <h3 id="s4">Обратная связь</h3>
            <label class="radio-option">
                <input type="checkbox" id="sound" checked>
                <span id="l1">Звук</span>
            </label>
            <label class="radio-option">
                <input type="checkbox" id="vibrate" checked>
                <span id="l2">Вибрация</span>
            </label>
            
            <button class="btn-primary" onclick="save()" id="saveBtn">Сохранить</button>
        </div>
        
        <div id="error" class="error hidden"></div>
        
        <div id="ready" class="ready-screen">
            <h2 id="t1">Готов к сканированию</h2>
            <p id="t2">Нажмите для запуска</p>
            <button class="btn-primary" onclick="start()" id="startBtn">ЗАПУСТИТЬ</button>
        </div>
        
        <div id="scanning" class="hidden">
            <div class="video-container">
                <video id="video" playsinline autoplay muted></video>
                <canvas id="canvas"></canvas>
                <div class="overlay"></div>
            </div>
            <div class="status" id="status">Наведите на QR-код</div>
            <button class="btn-stop" onclick="stop()" id="stopBtn">СТОП</button>
        </div>
        
        <div id="preview" class="preview hidden">
            <h2 id="t3">✓ Отсканировано</h2>
            <div class="preview-content" id="content"></div>
            <div class="btn-group">
                <button onclick="again()" id="againBtn">ЕЩЁ</button>
                <button id="openBtn" onclick="open()">ОТКРЫТЬ</button>
            </div>
        </div>
    </div>
    
    <div id="redirecting" class="redirecting hidden"><span id="t4">Открытие...</span></div>

    <script>
        let video, canvas, ctx, stream, scanning = false;
        let mode = 'auto', url = '', params = [], code = '', lang = 'ru';
        
        const txt = {
            ru: {
                title: '🎯 QR Сканер', s1: 'Режим сканирования', s2: 'Базовый URL', s3: 'Параметры',
                s4: 'Обратная связь', m1: 'Открыть URL автоматически', m2: 'Добавить код к URL',
                m3: 'Предпросмотр', l1: 'Звук', l2: 'Вибрация', addBtn: '+ Добавить',
                saveBtn: 'Сохранить', t1: 'Готов к сканированию', t2: 'Нажмите для запуска',
                startBtn: 'ЗАПУСТИТЬ', status: 'Наведите на QR-код', stopBtn: 'СТОП',
                t3: '✓ Отсканировано', againBtn: 'ЕЩЁ', openBtn: 'ОТКРЫТЬ', t4: 'Открытие...'
            },
            he: {
                title: '🎯 סורק QR', s1: 'מצב סריקה', s2: 'URL בסיס', s3: 'פרמטרים',
                s4: 'משוב', m1: 'פתח URL אוטומטית', m2: 'הוסף קוד ל-URL',
                m3: 'תצוגה מקדימה', l1: 'צליל', l2: 'רטט', addBtn: '+ הוסף',
                saveBtn: 'שמור', t1: 'מוכן לסריקה', t2: 'לחץ להפעלה',
                startBtn: 'הפעל', status: 'כוון לקוד QR', stopBtn: 'עצור',
                t3: '✓ נסרק', againBtn: 'שוב', openBtn: 'פתח', t4: 'פותח...'
            }
        };
        
        function updateUI() {
            const t = txt[lang];
            Object.keys(t).forEach(k => {
                const el = document.getElementById(k);
                if (el) el.textContent = t[k];
            });
            document.body.dir = lang === 'he' ? 'rtl' : 'ltr';
            document.getElementById('urlSettings').classList.toggle('hidden', mode !== 'append');
        }
        
        function toggleLang() {
            lang = lang === 'ru' ? 'he' : 'ru';
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            updateUI();
        }
        
        function toggleSettings() {
            document.getElementById('settings').classList.toggle('hidden');
        }
        
        function load() {
            const s = localStorage.getItem('qr');
            if (s) {
                const d = JSON.parse(s);
                mode = d.mode || 'auto';
                url = d.url || '';
                params = d.params || [];
                lang = d.lang || 'ru';
                document.querySelector(`input[value="${mode}"]`).checked = true;
                document.getElementById('baseUrl').value = url;
                renderParams();
            }
            updateUI();
            document.getElementById('langBtn').textContent = lang.toUpperCase();
        }
        
        function save() {
            const d = {
                mode,
                url: document.getElementById('baseUrl').value,
                params,
                lang,
                sound: document.getElementById('sound').checked,
                vibrate: document.getElementById('vibrate').checked
            };
            localStorage.setItem('qr', JSON.stringify(d));
            url = d.url;
            alert('✓');
        }
        
        function addParam() {
            params.push({ id: Date.now(), n: '', v: '' });
            renderParams();
        }
        
        function renderParams() {
            document.getElementById('params').innerHTML = params.map(p => `
                <div class="param-row">
                    <input placeholder="${lang==='ru'?'Название':'שם'}" value="${p.n}" onchange="updateParam(${p.id},'n',this.value)">
                    <input placeholder="${lang==='ru'?'Значение':'ערך'}" value="${p.v}" onchange="updateParam(${p.id},'v',this.value)">
                    <button class="btn-delete" onclick="removeParam(${p.id})">✕</button>
                </div>
            `).join('');
        }
        
        function updateParam(id, f, val) {
            const p = params.find(x => x.id === id);
            if (p) p[f] = val;
        }
        
        function removeParam(id) {
            params = params.filter(x => x.id !== id);
            renderParams();
        }
        
        async function start() {
            video = document.getElementById('video');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('ready').classList.add('hidden');
                    document.getElementById('scanning').classList.remove('hidden');
                    scanning = true;
                    requestAnimationFrame(scan);
                };
            } catch (e) {
                showError('❌ ' + e.message);
            }
        }
        
        function scan() {
            if (!scanning || video.readyState !== 4) {
                if (scanning) requestAnimationFrame(scan);
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (typeof jsQR !== 'undefined') {
                const qr = jsQR(img.data, img.width, img.height);
                if (qr) {
                    handle(qr.data);
                    return;
                }
            }
            requestAnimationFrame(scan);
        }
        
        function handle(data) {
            stop();
            code = data;
            
            if (document.getElementById('vibrate').checked && 'vibrate' in navigator) {
                navigator.vibrate(100);
            }
            if (document.getElementById('sound').checked) {
                beep();
            }
            
            if (mode === 'auto') {
                if (isURL(data)) {
                    showRedir();
                    window.location.href = data;
                } else {
                    showPreview(data, false);
                }
            } else if (mode === 'append') {
                if (url) {
                    const u = buildURL(data);
                    showRedir();
                    window.location.href = u;
                } else {
                    showPreview(data, false);
                }
            } else {
                showPreview(data, isURL(data));
            }
        }
        
        function buildURL(c) {
            const p = new URLSearchParams();
            p.append('code', c);
            params.forEach(x => { if (x.n && x.v) p.append(x.n, x.v); });
            return url + (url.includes('?') ? '&' : '?') + p.toString();
        }
        
        function isURL(s) {
            try { new URL(s); return true; } catch { return s.startsWith('http'); }
        }
        
        function beep() {
            try {
                const a = new (window.AudioContext || window.webkitAudioContext)();
                const o = a.createOscillator(), g = a.createGain();
                o.connect(g);
                g.connect(a.destination);
                o.frequency.value = 800;
                g.gain.setValueAtTime(0.3, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.1);
                o.start();
                o.stop(a.currentTime + 0.1);
            } catch (e) {}
        }
        
        function showRedir() {
            document.getElementById('redirecting').classList.remove('hidden');
        }
        
        function showPreview(c, isUrl) {
            document.getElementById('scanning').classList.add('hidden');
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('content').textContent = c;
            document.getElementById('openBtn').classList.toggle('hidden', !isUrl);
        }
        
        function showError(m) {
            document.getElementById('error').textContent = m;
            document.getElementById('error').classList.remove('hidden');
        }
        
        function stop() {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            document.getElementById('scanning').classList.add('hidden');
            document.getElementById('ready').classList.remove('hidden');
        }
        
        function again() {
            document.getElementById('preview').classList.add('hidden');
            start();
        }
        
        function open() {
            if (code) {
                showRedir();
                window.location.href = code;
            }
        }
        
        load();
    </script>
</body>
</html>
