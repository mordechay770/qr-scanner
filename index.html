<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>QR Scanner</title>
    
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow-x: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Critical fix for video display */
        #qr-video {
            width: 100% !important;
            height: auto !important;
            max-width: 100% !important;
            display: block !important;
            object-fit: cover !important;
            background: #000 !important;
            min-height: 300px !important;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            overflow: hidden;
        }
        
        input, select, textarea { font-size: 16px !important; }
        .transition-fast { transition: all 0.15s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s ease-in-out infinite;
        }

        /* Ensure video is visible on all devices */
        video::-webkit-media-controls {
            display: none !important;
        }
        
        video {
            -webkit-playsinline: true;
            -moz-playsinline: true;
            playsinline: true;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    (function() {
        'use strict';
        
        let state = {
            scanning: false,
            settingsOpen: false,
            scanMode: 'auto_open_url',
            baseUrl: '',
            customParams: [],
            lastScanned: '',
            previewData: null,
            error: '',
            errorDetails: '',
            language: 'ru',
            saveMessage: '',
            soundEnabled: true,
            vibrationEnabled: true,
            debugInfo: ''
        };

        let videoElement = null;
        let canvasElement = null;
        let stream = null;
        let animationFrame = null;
        let audioContext = null;

        const translations = {
            ru: {
                title: 'QR Сканер',
                settings: 'Настройки',
                scanMode: 'Режим сканирования',
                mode1: 'Открыть URL автоматически',
                mode2: 'Добавить код к базовому URL',
                mode3: 'Предпросмотр URL',
                mode4: 'Показать содержимое',
                baseUrl: 'Базовый URL',
                customParams: 'Параметры',
                paramName: 'Название',
                paramValue: 'Значение',
                addParam: '+ Добавить',
                saveSettings: 'Сохранить',
                resetSettings: 'Сбросить',
                settingsSaved: '✓ Сохранено',
                soundFeedback: 'Звук',
                vibrationFeedback: 'Вибрация',
                readyToScan: 'Готов к сканированию',
                readyDescription: 'Нажмите для запуска',
                startScanner: 'ЗАПУСТИТЬ',
                aimCamera: 'Наведите на QR-код',
                stopScanning: 'СТОП',
                infoNote: 'Быстрое сканирование',
                previewTitle: 'Отсканировано',
                scannedContent: 'Содержимое:',
                openLink: 'ОТКРЫТЬ',
                scanAgain: 'ЕЩЁ РАЗ',
                mode2Required: 'Укажите URL',
                delete: 'X',
                requesting: 'Запуск камеры...',
                cameraStarting: 'Камера запускается...'
            },
            he: {
                title: 'סורק QR',
                settings: 'הגדרות',
                scanMode: 'מצב סריקה',
                mode1: 'פתח URL אוטומטית',
                mode2: 'הוסף ל-URL',
                mode3: 'תצוגה מקדימה',
                mode4: 'הצג תוכן',
                baseUrl: 'URL בסיס',
                customParams: 'פרמטרים',
                paramName: 'שם',
                paramValue: 'ערך',
                addParam: '+ הוסף',
                saveSettings: 'שמור',
                resetSettings: 'אפס',
                settingsSaved: '✓ נשמר',
                soundFeedback: 'צליל',
                vibrationFeedback: 'רטט',
                readyToScan: 'מוכן',
                readyDescription: 'לחץ להפעלה',
                startScanner: 'הפעל',
                aimCamera: 'כוון לקוד',
                stopScanning: 'עצור',
                infoNote: 'סריקה מהירה',
                previewTitle: 'נסרק',
                scannedContent: 'תוכן:',
                openLink: 'פתח',
                scanAgain: 'שוב',
                mode2Required: 'הגדר URL',
                delete: 'X',
                requesting: 'מפעיל מצלמה...',
                cameraStarting: 'המצלמה מתחילה...'
            }
        };

        function loadSettings() {
            try {
                const saved = localStorage.getItem('qr_scanner_settings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    state = { ...state, ...settings };
                }
            } catch (e) {}
        }

        function saveSettings() {
            const settings = {
                baseUrl: state.baseUrl,
                customParams: state.customParams,
                language: state.language,
                scanMode: state.scanMode,
                soundEnabled: state.soundEnabled,
                vibrationEnabled: state.vibrationEnabled
            };
            localStorage.setItem('qr_scanner_settings', JSON.stringify(settings));
            state.saveMessage = translations[state.language].settingsSaved;
            render();
            setTimeout(() => { state.saveMessage = ''; render(); }, 2000);
        }

        function playBeep() {
            if (!state.soundEnabled) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                osc.start();
                osc.stop(audioContext.currentTime + 0.1);
            } catch (e) {}
        }

        function triggerVibration() {
            if (!state.vibrationEnabled) return;
            try {
                if ('vibrate' in navigator) navigator.vibrate(100);
            } catch (e) {}
        }

        function isURL(str) {
            try {
                new URL(str);
                return true;
            } catch {
                return str.startsWith('http://') || str.startsWith('https://');
            }
        }

        function buildFinalUrl(qrCode) {
            if (!state.baseUrl) return '';
            const params = new URLSearchParams();
            params.append('code', qrCode);
            state.customParams.forEach(p => {
                if (p.name && p.value) params.append(p.name, p.value);
            });
            const sep = state.baseUrl.includes('?') ? '&' : '?';
            return state.baseUrl + sep + params.toString();
        }

        async function startCamera() {
            const t = translations[state.language];
            
            try {
                state.error = '';
                state.errorDetails = '';
                state.debugInfo = '';
                state.previewData = null;

                if (state.scanMode === 'append_to_url' && !state.baseUrl) {
                    state.error = t.mode2Required;
                    render();
                    return;
                }

                // Stop existing stream
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }

                state.error = t.cameraStarting;
                render();

                // CRITICAL FIX: Simple constraints for maximum compatibility
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                console.log('Requesting camera with constraints:', constraints);
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('Camera stream obtained:', stream);

                // Get video element BEFORE setting srcObject
                videoElement = document.getElementById('qr-video');
                
                if (!videoElement) {
                    throw new Error('Video element not found');
                }

                // CRITICAL: Set multiple attributes for compatibility
                videoElement.setAttribute('playsinline', '');
                videoElement.setAttribute('webkit-playsinline', '');
                videoElement.setAttribute('muted', '');
                videoElement.setAttribute('autoplay', '');
                videoElement.muted = true;
                videoElement.playsInline = true;
                
                // Set srcObject
                videoElement.srcObject = stream;
                
                // Force play with multiple attempts
                let playAttempts = 0;
                const attemptPlay = async () => {
                    try {
                        await videoElement.play();
                        console.log('Video playing successfully');
                        state.scanning = true;
                        state.error = '';
                        render();
                        
                        // Wait a bit for video to actually start
                        setTimeout(() => {
                            if (videoElement.videoWidth > 0) {
                                console.log('Video dimensions:', videoElement.videoWidth, 'x', videoElement.videoHeight);
                                startScanning();
                            } else {
                                console.warn('Video has no dimensions yet');
                                state.debugInfo = 'Waiting for video...';
                                render();
                                setTimeout(startScanning, 500);
                            }
                        }, 300);
                        
                    } catch (playErr) {
                        console.error('Play attempt failed:', playErr);
                        playAttempts++;
                        if (playAttempts < 3) {
                            setTimeout(attemptPlay, 300);
                        } else {
                            throw playErr;
                        }
                    }
                };

                // Start play attempts
                await attemptPlay();
                
            } catch (err) {
                console.error('Camera error:', err);
                state.scanning = false;
                
                if (err.name === 'NotAllowedError') {
                    state.error = '🔒 Доступ запрещён';
                    state.errorDetails = 'Разрешите доступ к камере в настройках браузера';
                } else if (err.name === 'NotFoundError') {
                    state.error = '📷 Камера не найдена';
                    state.errorDetails = 'Проверьте подключение камеры';
                } else if (err.name === 'NotReadableError') {
                    state.error = '⚠️ Камера занята';
                    state.errorDetails = 'Закройте другие приложения с камерой';
                } else {
                    state.error = '❌ Ошибка: ' + err.name;
                    state.errorDetails = err.message || 'Попробуйте перезагрузить страницу';
                }
                
                state.debugInfo = 'Error: ' + err.toString();
                render();
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            state.scanning = false;
            if (videoElement) {
                videoElement.srcObject = null;
            }
        }

        function detectQR() {
            if (!videoElement || !canvasElement) {
                animationFrame = requestAnimationFrame(detectQR);
                return;
            }

            if (videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                animationFrame = requestAnimationFrame(detectQR);
                return;
            }

            const canvas = canvasElement;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const w = videoElement.videoWidth;
            const h = videoElement.videoHeight;
            
            if (w > 0 && h > 0) {
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(videoElement, 0, 0, w, h);
                
                const imageData = ctx.getImageData(0, 0, w, h);
                
                if (typeof jsQR !== 'undefined') {
                    const code = jsQR(imageData.data, w, h, {
                        inversionAttempts: 'dontInvert'
                    });
                    
                    if (code && code.data) {
                        handleQRDetected(code.data);
                        return;
                    }
                }
            }

            animationFrame = requestAnimationFrame(detectQR);
        }

        function startScanning() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(detectQR);
        }

        function handleQRDetected(qrData) {
            stopCamera();
            playBeep();
            triggerVibration();
            state.lastScanned = qrData;

            switch (state.scanMode) {
                case 'auto_open_url':
                    if (isURL(qrData)) {
                        window.location.href = qrData;
                    } else {
                        state.previewData = { content: qrData, isUrl: false };
                        render();
                    }
                    break;
                case 'append_to_url':
                    window.location.href = buildFinalUrl(qrData);
                    break;
                case 'preview_url':
                case 'preview_content':
                    state.previewData = { content: qrData, isUrl: isURL(qrData) };
                    render();
                    break;
            }
        }

        function render() {
            const t = translations[state.language];
            const isRTL = state.language === 'he';
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-blue-600 to-purple-700 flex flex-col" dir="${isRTL ? 'rtl' : 'ltr'}">
                    <div class="bg-white/10 backdrop-blur-md border-b border-white/20 p-3">
                        <div class="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                                <i data-lucide="camera" class="w-6 h-6"></i>
                                ${t.title}
                            </h1>
                            <div class="flex gap-2">
                                <button onclick="window.qrApp.toggleLanguage()" class="p-2 rounded-lg bg-white/20 hover:bg-white/30 transition-fast text-white">
                                    <span class="text-xs font-bold">${state.language.toUpperCase()}</span>
                                </button>
                                <button onclick="window.qrApp.toggleSettings()" class="p-2 rounded-lg bg-white/20 hover:bg-white/30 transition-fast text-white">
                                    <i data-lucide="settings" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    ${state.settingsOpen ? renderSettings(t) : ''}

                    <div class="flex-1 flex items-center justify-center p-4">
                        <div class="max-w-2xl w-full">
                            ${state.error ? `
                                <div class="bg-red-500/20 border-2 border-red-400/50 rounded-xl p-4 mb-4 text-white text-center">
                                    <div class="font-bold text-lg mb-1">${state.error}</div>
                                    ${state.errorDetails ? `<div class="text-sm mb-2">${state.errorDetails}</div>` : ''}
                                    ${state.debugInfo ? `<div class="text-xs opacity-70 mt-2">${state.debugInfo}</div>` : ''}
                                </div>
                            ` : ''}
                            
                            ${state.previewData ? renderPreview(t) : ''}
                            ${!state.previewData && !state.scanning ? renderReady(t) : ''}
                            ${!state.previewData && state.scanning ? renderScanning(t) : ''}
                        </div>
                    </div>

                    <div class="bg-white/5 border-t border-white/10 p-2 text-center">
                        <p class="text-white/60 text-xs">${t.infoNote}</p>
                    </div>
                </div>
            `;

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            // CRITICAL: Get references AFTER render
            videoElement = document.getElementById('qr-video');
            canvasElement = document.getElementById('qr-canvas');
        }

        function renderSettings(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md border-b border-white/20 p-4 max-h-[60vh] overflow-y-auto hide-scrollbar">
                    <div class="max-w-4xl mx-auto">
                        ${state.saveMessage ? `<div class="bg-green-500/30 border border-green-400/50 rounded-lg p-2 mb-3 text-white text-center text-sm">${state.saveMessage}</div>` : ''}
                        
                        <div class="mb-3">
                            <label class="block text-sm font-semibold text-white mb-2">${t.scanMode}</label>
                            <div class="space-y-1">
                                ${['auto_open_url', 'append_to_url', 'preview_url', 'preview_content'].map((mode, i) => `
                                    <label class="flex items-center gap-2 p-2 bg-white/10 rounded-lg cursor-pointer hover:bg-white/15 transition-fast">
                                        <input type="radio" name="scanMode" value="${mode}" ${state.scanMode === mode ? 'checked' : ''} onchange="window.qrApp.setScanMode('${mode}')">
                                        <span class="text-white text-sm">${t['mode' + (i + 1)]}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        <div class="flex gap-2 mb-3">
                            <label class="flex-1 flex items-center gap-2 p-2 bg-white/10 rounded-lg cursor-pointer">
                                <input type="checkbox" ${state.soundEnabled ? 'checked' : ''} onchange="window.qrApp.toggleSound()">
                                <span class="text-white text-sm">${t.soundFeedback}</span>
                            </label>
                            <label class="flex-1 flex items-center gap-2 p-2 bg-white/10 rounded-lg cursor-pointer">
                                <input type="checkbox" ${state.vibrationEnabled ? 'checked' : ''} onchange="window.qrApp.toggleVibration()">
                                <span class="text-white text-sm">${t.vibrationFeedback}</span>
                            </label>
                        </div>

                        ${state.scanMode === 'append_to_url' ? `
                            <div class="mb-3">
                                <label class="block text-sm font-semibold text-white mb-1">${t.baseUrl}</label>
                                <input type="url" value="${state.baseUrl}" onchange="window.qrApp.setBaseUrl(this.value)" 
                                    class="w-full px-3 py-2 rounded-lg bg-white/20 border border-white/30 text-white placeholder-white/50 focus:outline-none text-sm" 
                                    placeholder="https://example.com" dir="ltr">
                            </div>

                            <div class="mb-3">
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-sm font-semibold text-white">${t.customParams}</label>
                                    <button onclick="window.qrApp.addParam()" class="px-3 py-1 bg-green-500/30 rounded-lg text-white text-xs border border-green-400/50">
                                        ${t.addParam}
                                    </button>
                                </div>
                                ${state.customParams.map(p => `
                                    <div class="flex gap-2 mb-2">
                                        <input type="text" value="${p.name}" onchange="window.qrApp.updateParam(${p.id}, 'name', this.value)"
                                            placeholder="${t.paramName}" dir="ltr"
                                            class="flex-1 px-2 py-1 rounded bg-white/20 border border-white/30 text-white text-sm">
                                        <input type="text" value="${p.value}" onchange="window.qrApp.updateParam(${p.id}, 'value', this.value)"
                                            placeholder="${t.paramValue}"
                                            class="flex-1 px-2 py-1 rounded bg-white/20 border border-white/30 text-white text-sm">
                                        <button onclick="window.qrApp.removeParam(${p.id})" class="px-2 py-1 bg-red-500/30 rounded text-white text-xs">
                                            ${t.delete}
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        <div class="flex gap-2">
                            <button onclick="window.qrApp.saveSettings()" class="flex-1 px-4 py-2 bg-blue-500/30 text-white rounded-lg font-semibold border border-blue-400/50 text-sm">
                                ${t.saveSettings}
                            </button>
                            <button onclick="window.qrApp.resetSettings()" class="px-4 py-2 bg-red-500/30 text-white rounded-lg border border-red-400/50 text-sm">
                                ${t.resetSettings}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPreview(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 text-center border border-white/20">
                    <i data-lucide="check-circle" class="w-16 h-16 mx-auto mb-4 text-green-400"></i>
                    <h2 class="text-xl font-bold text-white mb-3">${t.previewTitle}</h2>
                    <div class="bg-white/20 rounded-lg p-3 mb-4">
                        <div class="text-white break-all text-sm bg-black/20 p-2 rounded" dir="ltr">${state.previewData.content}</div>
                    </div>
                    <div class="flex gap-2">
                        ${state.previewData.isUrl ? `
                            <button onclick="window.qrApp.openUrl()" class="flex-1 px-6 py-3 bg-green-500/30 text-white rounded-xl font-bold border border-green-400/50">
                                ${t.openLink}
                            </button>
                        ` : ''}
                        <button onclick="window.qrApp.scanAgain()" class="flex-1 px-6 py-3 bg-blue-500/30 text-white rounded-xl font-bold border border-blue-400/50">
                            ${t.scanAgain}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderReady(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-8 text-center border border-white/20">
                    <i data-lucide="scan" class="w-20 h-20 mx-auto mb-6 text-white/80 pulse-ring"></i>
                    <h2 class="text-2xl font-bold text-white mb-2">${t.readyToScan}</h2>
                    <p class="text-white/80 mb-6">${t.readyDescription}</p>
                    <button onclick="window.qrApp.startCamera()" class="px-12 py-4 bg-white text-blue-600 rounded-xl font-bold text-xl hover:bg-white/90 shadow-lg">
                        ${t.startScanner}
                    </button>
                </div>
            `;
        }

        function renderScanning(t) {
            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
                    <div class="video-container">
                        <video id="qr-video" playsinline webkit-playsinline autoplay muted></video>
                        <canvas id="qr-canvas" style="display:none;"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="w-56 h-56 border-4 border-white rounded-2xl relative pulse-ring">
                                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-2xl"></div>
                                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-2xl"></div>
                                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-2xl"></div>
                                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-2xl"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 bg-white/5">
                        <p class="text-white text-center mb-2 font-semibold">${t.aimCamera}</p>
                        <button onclick="window.qrApp.stopCamera()" class="w-full px-6 py-3 bg-red-500/30 text-white rounded-lg font-bold border border-red-400/50">
                            ${t.stopScanning}
                        </button>
                    </div>
                </div>
            `;
        }

        window.qrApp = {
            startCamera: () => { startCamera(); },
            stopCamera: () => { stopCamera(); render(); },
            toggleSettings: () => { state.settingsOpen = !state.settingsOpen; render(); },
            toggleLanguage: () => {
                state.language = state.language === 'ru' ? 'he' : 'ru';
                saveSettings();
            },
            setScanMode: (mode) => { state.scanMode = mode; render(); },
            toggleSound: () => { state.soundEnabled = !state.soundEnabled; },
            toggleVibration: () => { state.vibrationEnabled = !state.vibrationEnabled; },
            setBaseUrl: (url) => { state.baseUrl = url; render(); },
            addParam: () => { 
                state.customParams.push({ id: Date.now(), name: '', value: '' }); 
                render(); 
            },
            updateParam: (id, field, value) => {
                const param = state.customParams.find(p => p.id === id);
                if (param) param[field] = value;
            },
            removeParam: (id) => {
                state.customParams = state.customParams.filter(p => p.id !== id);
                render();
            },
            saveSettings: () => { saveSettings(); },
            resetSettings: () => {
                localStorage.removeItem('qr_scanner_settings');
                state.baseUrl = '';
                state.customParams = [];
                state.scanMode = 'auto_open_url';
                render();
            },
            openUrl: () => {
                if (state.previewData) window.location.href = state.previewData.content;
            },
            scanAgain: () => {
                state.previewData = null;
                startCamera();
            }
        };

        loadSettings();
        render();
    })();
    </script>
</body>
</html>
